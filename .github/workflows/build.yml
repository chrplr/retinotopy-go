name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        if: "startsWith(github.ref, 'refs/tags/')"
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (Snapshot)
        uses: goreleaser/goreleaser-action@v6
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          version: latest
          args: build --snapshot --clean

  installers-linux-windows:
    needs: goreleaser
    if: "startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Build Windows Installers (NSIS)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Use pre-generated icon.ico from assets/icons/
          cp assets/icons/icon.ico .

          for ARCH in amd64 arm64; do
            echo "Building Windows installer for $ARCH..."
            gh release download v$VERSION --pattern "*windows_${ARCH}.zip" --dir "win_${ARCH}"
            unzip win_${ARCH}/*.zip -d "win_${ARCH}/extracted"

            # Create NSIS script
            cat <<EOF > installer_${ARCH}.nsi
            !include "MUI2.nsh"
            !include "x64.nsh"

            Name "Retinotopy v$VERSION ($ARCH)"
            OutFile "retinotopy-v$VERSION-windows-${ARCH}-setup.exe"
            InstallDir "\$PROGRAMFILES64\Retinotopy"

            !define MUI_ICON "icon.ico"
            !define MUI_UNICON "icon.ico"

            !insertmacro MUI_PAGE_WELCOME
            !insertmacro MUI_PAGE_DIRECTORY
            !insertmacro MUI_PAGE_INSTFILES
            !insertmacro MUI_PAGE_FINISH
            !insertmacro MUI_UNPAGE_WELCOME
            !insertmacro MUI_UNPAGE_CONFIRM
            !insertmacro MUI_UNPAGE_INSTFILES
            !insertmacro MUI_UNPAGE_FINISH
            !insertmacro MUI_LANGUAGE "English"

            Function .onInit
                \${If} \${RunningX64}
                    SetRegView 64
                \${EndIf}
            FunctionEnd

            Section "Install"
                SetOutPath "\$INSTDIR"
                File "win_${ARCH}/extracted/retinotopy.exe"
                File "win_${ARCH}/extracted/SDL3.dll"
                File /r "win_${ARCH}/extracted/assets"
                File "win_${ARCH}/extracted/README.md"
                WriteUninstaller "\$INSTDIR\Uninstall.exe"
                CreateShortcut "\$SMPROGRAMS\Retinotopy.lnk" "\$INSTDIR\retinotopy.exe" "" "\$INSTDIR\retinotopy.exe" 0
            SectionEnd

            Section "Uninstall"
                Delete "\$INSTDIR\retinotopy.exe"
                Delete "\$INSTDIR\SDL3.dll"
                RMDir /r "\$INSTDIR\assets"
                Delete "\$INSTDIR\README.md"
                Delete "\$INSTDIR\Uninstall.exe"
                RMDir "\$INSTDIR"
                Delete "\$SMPROGRAMS\Retinotopy.lnk"
            SectionEnd
          EOF

            makensis installer_${ARCH}.nsi
            gh release upload v$VERSION "retinotopy-v$VERSION-windows-${ARCH}-setup.exe"
          done

      - name: Build Linux AppImages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Install appimagetool and FUSE (needed to run AppImages in CI)
          sudo apt-get update
          sudo apt-get install -y libfuse2
          curl -Lfo appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          for ARCH in amd64 arm64; do
            echo "Building AppImage for $ARCH..."
            gh release download v$VERSION --pattern "*linux_${ARCH}.zip" --dir "linux_${ARCH}"
            unzip linux_${ARCH}/*.zip -d "linux_${ARCH}/extracted"

            # Prepare AppDir
            APPDIR="Retinotopy.AppDir"
            mkdir -p $APPDIR/usr/bin
            mkdir -p $APPDIR/usr/share/retinotopy
            cp linux_${ARCH}/extracted/retinotopy $APPDIR/usr/bin/
            cp -r linux_${ARCH}/extracted/assets $APPDIR/usr/share/retinotopy/

            # Use pre-generated desktop file from assets/
            cp assets/retinotopy.desktop $APPDIR/

            # Create AppRun
            cat <<EOF > $APPDIR/AppRun
            #!/bin/bash
            HERE="\$(dirname "\$(readlink -f "\${0}")")"
            exec "\${HERE}/usr/bin/retinotopy" -assets "\${HERE}/usr/share/retinotopy/assets" "\$@"
          EOF
            chmod +x $APPDIR/AppRun

            # Use pre-generated icon.png from assets/icons/
            cp assets/icons/icon.png $APPDIR/retinotopy.png

            if [ "$ARCH" == "amd64" ]; then APP_ARCH="x86_64"; else APP_ARCH="aarch64"; fi
            ARCH=$APP_ARCH ./appimagetool-x86_64.AppImage $APPDIR "retinotopy-v$VERSION-linux-${APP_ARCH}.AppImage"
            gh release upload v$VERSION "retinotopy-v$VERSION-linux-${APP_ARCH}.AppImage"
            rm -rf $APPDIR
          done

  installers-macos:
    needs: goreleaser
    if: "startsWith(github.ref, 'refs/tags/')"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build macOS DMGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          brew install create-dmg

          for ARCH in amd64 arm64; do
            echo "Building macOS DMG for $ARCH..."
            gh release download v$VERSION --pattern "*darwin_${ARCH}.zip" --dir "macos_${ARCH}"
            unzip macos_${ARCH}/*.zip -d "macos_${ARCH}/extracted"

            # Create .app bundle
            APP_NAME="Retinotopy.app"
            mkdir -p "$APP_NAME/Contents/MacOS"
            mkdir -p "$APP_NAME/Contents/Resources"
            cp "macos_${ARCH}/extracted/retinotopy" "$APP_NAME/Contents/MacOS/"
            cp -r "macos_${ARCH}/extracted/assets" "$APP_NAME/Contents/MacOS/"
            # Use pre-generated icon.icns from assets/icons/
            cp assets/icons/icon.icns "$APP_NAME/Contents/Resources/AppIcon.icns"

            # Simple Info.plist
            cat <<EOF > "$APP_NAME/Contents/Info.plist"
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
                <key>CFBundleExecutable</key>
                <string>retinotopy</string>
                <key>CFBundleIdentifier</key>
                <string>org.pallier.retinotopy</string>
                <key>CFBundleName</key>
                <string>Retinotopy</string>
                <key>CFBundlePackageType</key>
                <string>APPL</string>
                <key>CFBundleShortVersionString</key>
                <string>$VERSION</string>
                <key>CFBundleIconFile</key>
                <string>AppIcon</string>
            </dict>
            </plist>
          EOF

            # Create DMG
            create-dmg \
              --volname "Retinotopy $VERSION" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --icon "Retinotopy.app" 200 190 \
              --hide-extension "Retinotopy.app" \
              --app-drop-link 600 185 \
              "retinotopy-v$VERSION-macos-${ARCH}.dmg" \
              "Retinotopy.app"

            gh release upload v$VERSION "retinotopy-v$VERSION-macos-${ARCH}.dmg"
            rm -rf "$APP_NAME"
          done
